<div class="layout-principal">
  <aside class="sidebar">
    <div class="foto-perfil">
       <img src="images/EU.jpg" alt="Foto">
    </div>
    <h1>José Rogério</h1>
    <h2>Desenvolvedor Web</h2>
    <p>Atua como desenvolvedor de software em: IFRN campus Pau dos Ferros</p>

    <header>

  </main>
</div>
