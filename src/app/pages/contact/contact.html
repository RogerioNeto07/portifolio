<div>
  <a href="/" class="return_link">
    <i class="fas fa-arrow-left"></i>
  </a>
</div>

<div class="contato-container">
  <h2 class="titulo-pagina">Informações de contato:</h2>

  <div class="info-geral">
    <div class="item-contato">
      <span class="label">E-mail:</span>
      <a href="mailto:{{ email() }}" class="valor">{{ email() }}</a>
    </div>
    <div class="item-contato">
      <span class="label">Telefone:</span>
      <span class="valor">{{ telefone() }}</span>
    </div>
  </div>

  <div class="redes-lista">
    @for (rede of redesSociais(); track rede.nome) {
      <a [href]="rede.link" target="_blank" class="card-rede">
        <i [class]="rede.icone"></i>
        <span> {{ rede.nome }} <svg lucideArrowBigRight size="20"></svg></span>
      </a>
    }
  </div>
</div>
